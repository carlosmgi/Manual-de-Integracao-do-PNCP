version: 2

build:
  os: "ubuntu-22.04"
  tools:
    python: "3.11"
  jobs:
    post_build:
      # Cria a pasta para a página única dentro do diretório de saída HTML
      - mkdir -p $READTHEDOCS_OUTPUT/html/singlehtml/
      # Compila a versão de página única diretamente para essa nova pasta
      - sphinx-build -b singlehtml docs/ $READTHEDOCS_OUTPUT/html/singlehtml/

# Configuração corrigida do Sphinx
sphinx:
  configuration: docs/conf.py

# Os formatos adicionais de download (PDF, ZIP) ficam na raiz do arquivo na V2, e não dentro de 'sphinx'
formats:
  - pdf
  - htmlzip
